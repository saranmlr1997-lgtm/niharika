server {
    listen 80;
    server_name pickwise.guru www.pickwise.guru pickwise.co www.pickwise.co;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name pickwise.guru www.pickwise.guru pickwise.co www.pickwise.co;

    # Replace these paths with the certificates created by Certbot or Hostinger VPS SSL tooling.
    ssl_certificate /etc/letsencrypt/live/pickwise.guru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pickwise.guru/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
